<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taj Mod | Live Server List & Player Tracker</title>
    <meta name="description" content="Taj Mod SCP: Secret Laboratory live server browser - view all active servers, player counts, and server details">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #b14bff;
            --accent-bright: #d28bff;
            --accent-dim: #8a2be2;
            --bg-deep: #07050d;
            --bg-mid: #0f0a1f;
            --panel: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(177, 75, 255, 0.18);
            --text-main: #f0e9ff;
            --text-dim: #9a8fb8;
            --danger: #ff4d6d;
            --warn: #ffb14d;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: radial-gradient(circle at 20% 0%, #2a0e4d 0%, var(--bg-mid) 35%, var(--bg-deep) 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-main);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 80% 10%, rgba(177, 75, 255, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 10% 90%, rgba(138, 43, 226, 0.1) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .header {
            background: rgba(10, 6, 20, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--panel-border);
            box-shadow: 0 4px 30px rgba(177, 75, 255, 0.08);
            padding: 20px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: relative;
            z-index: 1;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 20px rgba(177, 75, 255, 0.5);
            flex-shrink: 0;
        }

        .logo h1 {
            background: linear-gradient(135deg, #fff 0%, var(--accent-bright) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .logo p {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .stats-container {
            display: flex;
            gap: 14px;
            background: var(--panel);
            backdrop-filter: blur(10px);
            padding: 12px 22px;
            border-radius: 16px;
            border: 1px solid var(--panel-border);
        }

        .stat {
            text-align: center;
            min-width: 70px;
            position: relative;
        }

        .stat:not(:last-child)::after {
            content: '';
            position: absolute;
            right: -7px;
            top: 50%;
            transform: translateY(-50%);
            height: 60%;
            width: 1px;
            background: var(--panel-border);
        }

        .stat-value {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-bright), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .refresh-btn {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 18px rgba(177, 75, 255, 0.35);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 6px 24px rgba(177, 75, 255, 0.55);
            filter: brightness(1.1);
        }

        .refresh-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .refresh-icon {
            display: inline-block;
            transition: transform 0.4s ease;
        }

        .refresh-btn:hover .refresh-icon {
            transform: rotate(180deg);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 30px;
            position: relative;
            z-index: 1;
        }

        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 28px;
            background: var(--panel);
            backdrop-filter: blur(10px);
            padding: 18px 22px;
            border-radius: 16px;
            border: 1px solid var(--panel-border);
        }

        .filter-input {
            background: rgba(20, 12, 36, 0.7);
            border: 1px solid var(--panel-border);
            color: #fff;
            padding: 12px 16px;
            border-radius: 10px;
            flex: 1;
            min-width: 160px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .filter-input::placeholder {
            color: var(--text-dim);
        }

        .filter-input:focus, .filter-input:hover {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(177, 75, 255, 0.15);
        }

        .servers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 22px;
        }

        .server-card {
            background: linear-gradient(160deg, rgba(40, 20, 70, 0.45) 0%, rgba(15, 10, 28, 0.7) 100%);
            backdrop-filter: blur(8px);
            border-radius: 18px;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid var(--panel-border);
            position: relative;
            animation: cardIn 0.5s ease both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .server-card:hover {
            transform: translateY(-6px);
            border-color: var(--accent);
            box-shadow: 0 16px 40px rgba(177, 75, 255, 0.22);
        }

        .server-header {
            background: rgba(0, 0, 0, 0.25);
            padding: 16px 20px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .server-name {
            font-weight: 700;
            font-size: 16px;
            color: #fff;
            word-break: break-word;
            flex: 1;
        }

        .official-badge {
            background: linear-gradient(135deg, var(--accent-bright), var(--accent));
            color: #1a0a2e;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            white-space: nowrap;
            letter-spacing: 0.5px;
            box-shadow: 0 0 12px rgba(177, 75, 255, 0.4);
        }

        .community-badge {
            background: rgba(177, 75, 255, 0.12);
            color: var(--accent-bright);
            border: 1px solid rgba(177, 75, 255, 0.3);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .server-body {
            padding: 18px 20px;
        }

        .player-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .player-count {
            font-size: 26px;
            font-weight: 800;
        }

        .player-count .max {
            color: var(--text-dim);
            font-size: 17px;
            font-weight: 600;
        }

        .status-pill {
            font-size: 12px;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px currentColor;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.6s ease;
            box-shadow: 0 0 10px currentColor;
        }

        .server-details {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--panel-border);
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .detail-item strong {
            color: var(--accent-bright);
            font-weight: 700;
        }

        .loading, .error {
            text-align: center;
            padding: 70px 30px;
            font-size: 18px;
            color: var(--text-dim);
            grid-column: 1 / -1;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .spinner {
            width: 38px;
            height: 38px;
            border: 3px solid rgba(177, 75, 255, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            color: var(--danger);
            background: rgba(255, 77, 109, 0.08);
            border: 1px solid rgba(255, 77, 109, 0.25);
            border-radius: 16px;
        }

        .footer {
            text-align: center;
            padding: 36px 20px;
            color: var(--text-dim);
            border-top: 1px solid var(--panel-border);
            margin-top: 50px;
            position: relative;
            z-index: 1;
            font-size: 13px;
        }

        .footer p:first-child {
            margin-bottom: 6px;
        }

        .last-update {
            text-align: center;
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 24px;
        }

        .connection-details {
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid var(--panel-border);
            padding: 10px 14px;
            border-radius: 10px;
            margin-top: 14px;
            font-size: 12px;
            font-family: 'Roboto Mono', 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .connection-details span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .copy-btn {
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            filter: brightness(1.15);
            transform: scale(1.04);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 8px 30px rgba(177, 75, 255, 0.4);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 768px) {
            .servers-grid {
                grid-template-columns: 1fr;
            }
            .stats-container {
                width: 100%;
                justify-content: space-around;
            }
            .header-content {
                flex-direction: column;
                align-items: stretch;
            }
            .refresh-btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">🎮</div>
                <div>
                    <h1>Taj Mod Server Browser</h1>
                    <p>SCP: Secret Laboratory — Live Server List</p>
                </div>
            </div>
            <div class="stats-container">
                <div class="stat">
                    <div class="stat-value" id="totalPlayers">0</div>
                    <div class="stat-label">Players</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="totalServers">0</div>
                    <div class="stat-label">Servers</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="officialServers">0</div>
                    <div class="stat-label">Official</div>
                </div>
            </div>
            <button class="refresh-btn" onclick="fetchServers()"><span class="refresh-icon">⟳</span> Refresh</button>
        </div>
    </div>

    <div class="container">
        <div class="filters">
            <input type="text" class="filter-input" id="searchInput" placeholder="🔍 Search server name..." onkeyup="filterServers()">
            <select class="filter-input" id="typeFilter" onchange="filterServers()">
                <option value="all">🎮 All Servers</option>
                <option value="official">👑 Official Only</option>
                <option value="community">🏠 Community Only</option>
            </select>
            <select class="filter-input" id="ffFilter" onchange="filterServers()">
                <option value="all">⚔️ All (Friendly Fire)</option>
                <option value="yes">✅ Friendly Fire ON</option>
                <option value="no">❌ Friendly Fire OFF</option>
            </select>
        </div>

        <div id="serversContainer" class="servers-grid">
            <div class="loading"><div class="spinner"></div>Loading server data from Taj Mod API...</div>
        </div>
        <div class="last-update" id="lastUpdate">Last update: --</div>
    </div>

    <div class="footer">
        <p>📊 Data fetched from official Taj Mod API · Refreshes every 30 seconds</p>
        <p style="font-size: 11px;">© 2026 Taj Mod Community · Not affiliated with Northwood Studios</p>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let allServers = [];

        function decodeServerName(encoded) {
            if (!encoded) return "Taj Mod Server";
            try {
                let decoded = atob(encoded);
                decoded = decoded
                    .replace(/<size[^>]*>/gi, '')
                    .replace(/<\/size>/gi, '')
                    .replace(/<smallcaps>/gi, '')
                    .replace(/<\/smallcaps>/gi, '')
                    .replace(/<b>/gi, '')
                    .replace(/<\/b>/gi, '')
                    .replace(/<i>/gi, '')
                    .replace(/<\/i>/gi, '')
                    .replace(/<u>/gi, '')
                    .replace(/<\/u>/gi, '');
                decoded = decoded.replace(/&amp;/g, '&');
                decoded = decoded.replace(/&lt;/g, '<');
                decoded = decoded.replace(/&gt;/g, '>');
                return decoded.trim() || "Taj Mod Server";
            } catch (e) {
                return "Taj Mod Server";
            }
        }

        function parsePlayers(playersStr) {
            if (typeof playersStr === 'string' && playersStr.includes('/')) {
                const [current, max] = playersStr.split('/');
                return { current: parseInt(current) || 0, max: parseInt(max) || 64 };
            }
            return { current: 0, max: 64 };
        }

        async function fetchServers() {
            const container = document.getElementById('serversContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div>Fetching live server data...</div>';

            try {
                const response = await fetch('https://cs.mistaken.pl/lobbylist.php?format=json&version=2&minimal=1');

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                allServers = data.servers || [];

                updateStats();
                renderServers(allServers);

                const now = new Date();
                document.getElementById('lastUpdate').innerHTML = `🕐 Last updated: ${now.toLocaleTimeString()}`;

            } catch (error) {
                console.error('Fetch error:', error);
                container.innerHTML = `<div class="error">❌ Failed to load server data: ${error.message}<br><br>🔄 Please check your connection and try again.</div>`;
            }
        }

        function updateStats() {
            let totalPlayers = 0;
            let officialCount = 0;

            allServers.forEach(server => {
                const players = parsePlayers(server.players);
                totalPlayers += players.current;
                if (server.officialCode > 0) officialCount++;
            });

            document.getElementById('totalPlayers').innerHTML = totalPlayers;
            document.getElementById('totalServers').innerHTML = allServers.length;
            document.getElementById('officialServers').innerHTML = officialCount;
        }

        function filterServers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;
            const ffFilter = document.getElementById('ffFilter').value;

            let filtered = allServers.filter(server => {
                const serverName = decodeServerName(server.info).toLowerCase();

                if (searchTerm && !serverName.includes(searchTerm)) return false;

                if (typeFilter === 'official' && server.officialCode === 0) return false;
                if (typeFilter === 'community' && server.officialCode > 0) return false;

                if (ffFilter === 'yes' && !server.friendlyFire) return false;
                if (ffFilter === 'no' && server.friendlyFire) return false;

                return true;
            });

            renderServers(filtered);
        }

        function getRegionFlag(ip) {
            const regions = {
                '51.75': '🇪🇺', '57.128': '🇪🇺', '89.144': '🇪🇺', '83.168': '🇪🇺',
                '45.136': '🇷🇺', '69.9': '🇺🇸', '23.139': '🇺🇸', '160.222': '🇦🇺'
            };
            for (const [prefix, flag] of Object.entries(regions)) {
                if (ip.startsWith(prefix)) return flag;
            }
            return '🌍';
        }

        function richTextToHtml(decoded) {
            // Escape base HTML first, keep < and > as placeholders for allowed tags
            let s = decoded
                .replace(/&/g, '&amp;')
                .replace(/</g, '\u0001')
                .replace(/>/g, '\u0002');

            // <color=#RRGGBB> or <color=colorname> ... </color>
            s = s.replace(/\u0001color=(#[0-9A-Fa-f]{3,8}|[a-zA-Z]+)\u0002/gi, '<span style="color:$1">');
            s = s.replace(/\u0001\/color\u0002/gi, '</span>');

            // <b> <i> <u> ... </b></i></u>
            s = s.replace(/\u0001(\/?)(b|i|u)\u0002/gi, '<$1$2>');

            // <size=N> ... </size> (clamped so it can't break layout)
            s = s.replace(/\u0001size=(\d{1,3})\u0002/gi, (m, n) => {
                const pct = Math.min(150, Math.max(50, parseInt(n, 10) || 100));
                return `<span style="font-size:${pct}%">`;
            });
            s = s.replace(/\u0001\/size\u0002/gi, '</span>');

            // <link="URL"> ... </link> - drop the link wrapper but keep the text
            s = s.replace(/\u0001link=[^\u0002]*\u0002/gi, '');
            s = s.replace(/\u0001\/link\u0002/gi, '');

            // Any remaining unrecognized tags get escaped to literal text
            s = s.replace(/\u0001/g, '&lt;').replace(/\u0002/g, '&gt;');

            return balanceTags(truncateHtml(s, 60));
        }

        function truncateHtml(html, maxLen) {
            let result = '';
            let count = 0;
            let i = 0;
            while (i < html.length && count < maxLen) {
                if (html[i] === '<') {
                    const end = html.indexOf('>', i);
                    if (end === -1) break;
                    result += html.slice(i, end + 1);
                    i = end + 1;
                } else {
                    result += html[i];
                    count++;
                    i++;
                }
            }
            if (i < html.length) result += '…';
            return result;
        }

        function balanceTags(html) {
            const stack = [];
            const tagRegex = /<(\/?)(span|b|i|u)[^>]*>/gi;
            let m;
            while ((m = tagRegex.exec(html)) !== null) {
                if (!m[1]) {
                    stack.push(m[2].toLowerCase());
                } else {
                    const idx = stack.lastIndexOf(m[2].toLowerCase());
                    if (idx !== -1) stack.splice(idx, 1);
                }
            }
            while (stack.length) {
                html += `</${stack.pop()}>`;
            }
            return html;
        }

        function stripTags(str) {
            return str.replace(/<[^>]*>/g, '');
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            showToast(`Copied: ${text}`);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2200);
        }

        function renderServers(servers) {
            const container = document.getElementById('serversContainer');

            if (servers.length === 0) {
                container.innerHTML = '<div class="error">🔍 No servers match your filters. Try adjusting your search.</div>';
                return;
            }

            container.innerHTML = servers.map((server, idx) => {
                const serverName = decodeServerName(server.info);
                const players = parsePlayers(server.players);
                const percentage = (players.current / players.max) * 100;
                const isOfficial = server.officialCode > 0;
                const regionFlag = getRegionFlag(server.ip);

                let statusColor = '#b14bff';
                let statusText = 'Online';
                if (players.current === 0) {
                    statusColor = '#6b6580';
                    statusText = 'Empty';
                } else if (percentage > 90) {
                    statusColor = '#ff4d6d';
                    statusText = 'Full';
                } else if (percentage > 50) {
                    statusColor = '#ffb14d';
                    statusText = 'Busy';
                }

                const connectString = `connect ${server.ip}:${server.port}`;
                const animDelay = Math.min(idx * 0.04, 0.6);

                return `
                    <div class="server-card" style="animation-delay: ${animDelay}s">
                        <div class="server-header">
                            <div class="server-name" title="${stripTags(serverName).replace(/"/g, '&quot;')}">
                                ${regionFlag} ${richTextToHtml(serverName)}
                            </div>
                            ${isOfficial ? '<span class="official-badge">👑 OFFICIAL</span>' : '<span class="community-badge">🏠 COMMUNITY</span>'}
                        </div>
                        <div class="server-body">
                            <div class="player-info">
                                <div class="player-count">
                                    <span style="color: ${statusColor}">${players.current}</span>
                                    <span class="max">/${players.max}</span>
                                </div>
                                <div class="status-pill" style="color: ${statusColor}; background: ${statusColor}1a; border: 1px solid ${statusColor}40">
                                    <span class="status-dot" style="background: ${statusColor}"></span>${statusText}
                                </div>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${percentage}%; background: ${statusColor}; color: ${statusColor}"></div>
                            </div>
                            <div class="server-details">
                                <div class="detail-item">
                                    <span>🗺️</span>
                                    <span><strong>Map:</strong> ${server.map || 'Unknown'}</span>
                                </div>
                                <div class="detail-item">
                                    <span>📦</span>
                                    <span><strong>Version:</strong> ${server.version || '1.0.3'}</span>
                                </div>
                                ${server.friendlyFire ? '<div class="detail-item"><span>⚔️</span><span><strong>Friendly Fire:</strong> ON</span></div>' : ''}
                                ${server.modded ? '<div class="detail-item"><span>🔧</span><span><strong>Modded:</strong> Yes</span></div>' : ''}
                                ${server.whitelist ? '<div class="detail-item"><span>🔒</span><span><strong>Whitelist:</strong> Enabled</span></div>' : ''}
                            </div>
                            <div class="connection-details">
                                <span>🔗 ${server.ip}:${server.port}</span>
                                <button class="copy-btn" onclick="copyToClipboard('${connectString}')">📋 Copy</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        fetchServers();
        setInterval(fetchServers, 30000);
    </script>
</body>
</html>
