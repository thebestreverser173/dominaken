<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw API Data Viewer - See Exactly What Servers Send</title>
    <style>
        body {
            background: #0a0c15;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            padding: 20px;
            margin: 0;
        }
        h1 {
            color: #00ff41;
            font-size: 20px;
            margin-bottom: 10px;
        }
        .section {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            overflow-x: auto;
        }
        .section h2 {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 12px;
        }
        pre {
            white-space: pre-wrap;
            word-break: break-all;
            font-size: 11px;
            margin: 0;
            padding: 0;
        }
        .server-item {
            border-bottom: 1px solid #1f2937;
            padding: 12px;
            margin-bottom: 8px;
        }
        .server-item:last-child {
            border-bottom: none;
        }
        .label {
            color: #00ff41;
            font-weight: bold;
        }
        .raw-base64 {
            background: #00000033;
            padding: 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 10px;
            word-break: break-all;
        }
        .decoded-text {
            background: #1f2937;
            padding: 8px;
            border-radius: 4px;
            margin-top: 8px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        button {
            background: #00ff41;
            color: black;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 16px;
        }
        .char-codes {
            font-size: 10px;
            color: #ffaa44;
            margin-top: 8px;
        }
        hr {
            border-color: #1f2937;
            margin: 16px 0;
        }
    </style>
</head>
<body>
    <h1>🔍 RAW API DATA VIEWER</h1>
    <p style="margin-bottom: 16px; font-size: 12px;">This page shows EXACTLY what the API returns - no processing, no formatting.</p>
    
    <button id="refreshBtn">⟳ Fetch Raw Data</button>
    
    <div class="section">
        <h2>📡 RAW API RESPONSE (first 500 chars)</h2>
        <pre id="rawResponse">Click refresh to load...</pre>
    </div>
    
    <div class="section">
        <h2>🎮 SERVER LIST - RAW DECODED NAMES</h2>
        <div id="serversList">Loading...</div>
    </div>
    
    <div class="section">
        <h2>🔬 WHAT IS "á´á´"? - CHARACTER ANALYSIS</h2>
        <div id="analysis"></div>
    </div>
    
    <script>
        async function fetchData() {
            document.getElementById('rawResponse').innerText = 'Fetching...';
            document.getElementById('serversList').innerHTML = 'Loading...';
            
            try {
                const response = await fetch('https://cs.mistaken.pl/lobbylist.php?format=json&version=2&minimal=1');
                const data = await response.json();
                
                // Show raw response preview
                const rawJson = JSON.stringify(data, null, 2);
                document.getElementById('rawResponse').innerText = rawJson.substring(0, 2000) + (rawJson.length > 2000 ? '\n\n... (truncated)' : '');
                
                // Process servers
                const servers = data.servers || [];
                let serversHtml = '';
                
                for (let i = 0; i < servers.length; i++) {
                    const server = servers[i];
                    const base64Name = server.info || '';
                    let decodedName = '';
                    let decodedHex = '';
                    
                    try {
                        decodedName = atob(base64Name);
                        decodedHex = '';
                        for (let j = 0; j < decodedName.length && j < 100; j++) {
                            decodedHex += decodedName.charCodeAt(j).toString(16) + ' ';
                        }
                    } catch(e) {
                        decodedName = 'DECODE ERROR: ' + e.message;
                    }
                    
                    serversHtml += `
                        <div class="server-item">
                            <div><span class="label">IP:</span> ${server.ip || '?'}:${server.port || '?'}</div>
                            <div><span class="label">Official:</span> ${server.officialCode > 0 ? 'YES' : 'NO'}</div>
                            <div><span class="label">Players:</span> ${server.players || 0}</div>
                            <div style="margin-top: 8px;"><span class="label">BASE64 (raw):</span></div>
                            <div class="raw-base64">${escapeHtml(base64Name.substring(0, 200))}${base64Name.length > 200 ? '...' : ''}</div>
                            <div style="margin-top: 8px;"><span class="label">DECODED TEXT:</span></div>
                            <div class="decoded-text">${escapeHtml(decodedName.substring(0, 300))}</div>
                            <div class="char-codes">Char codes (first 20): ${decodedHex}</div>
                        </div>
                    `;
                }
                
                document.getElementById('serversList').innerHTML = serversHtml || '<p>No servers found</p>';
                
                // Character analysis for á´á´
                const weirdChars = 'á´á´';
                let analysisHtml = `
                    <p><strong>String:</strong> "${weirdChars}"</p>
                    <p><strong>Length:</strong> ${weirdChars.length} characters</p>
                    <p><strong>Character codes:</strong></p>
                    <ul>
                `;
                for (let i = 0; i < weirdChars.length; i++) {
                    const code = weirdChars.charCodeAt(i);
                    const hex = code.toString(16);
                    analysisHtml += `<li>Character ${i}: code ${code} (0x${hex}) - ${getCharDescription(code)}</li>`;
                }
                analysisHtml += `</ul>`;
                analysisHtml += `<hr><p><strong>These are Unicode "LATIN SMALL LETTER" modifier characters.</strong> They come from the server's base64-encoded name. The string "á´á´" is actually meant to be "MISTAKEN" but written with small caps Unicode characters that many fonts don't render properly.</p>`;
                analysisHtml += `<p><strong>Solution:</strong> Map these Unicode small caps to regular ASCII letters:</p>`;
                analysisHtml += `<ul>`;
                analysisHtml += `<li>á´ → M (Unicode U+1D07 - LATIN LETTER SMALL CAPITAL M)</li>`;
                analysisHtml += `<li>á´ → I (Unicode U+1D1C - LATIN LETTER SMALL CAPITAL I)</li>`;
                analysisHtml += `<li>á´ → T (Unicode U+1D04 - LATIN LETTER SMALL CAPITAL T)</li>`;
                analysisHtml += `<li>á´ → S (Unicode U+1D01 - LATIN LETTER SMALL CAPITAL S)</li>`;
                analysisHtml += `<li>á´ → K (Unicode U+1D02 - LATIN LETTER SMALL CAPITAL K)</li>`;
                analysisHtml += `<li>á´ → E (Unicode U+1D00 - LATIN LETTER SMALL CAPITAL E)</li>`;
                analysisHtml += `<li>á´ → N (Unicode U+1D05 - LATIN LETTER SMALL CAPITAL N)</li>`;
                analysisHtml += `</ul>`;
                
                document.getElementById('analysis').innerHTML = analysisHtml;
                
            } catch (error) {
                document.getElementById('rawResponse').innerText = 'Error: ' + error.message;
                document.getElementById('serversList').innerHTML = '<p class="error">Failed to fetch: ' + error.message + '</p>';
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function getCharDescription(code) {
            if (code >= 0x1D00 && code <= 0x1D1F) {
                return '↳ This is a Unicode "LATIN LETTER SMALL CAPITAL" character. Should be rendered as an uppercase letter but with small capital appearance. Many fonts display it incorrectly.';
            }
            if (code >= 0x41 && code <= 0x5A) {
                return '↳ Normal ASCII uppercase letter.';
            }
            if (code >= 0x61 && code <= 0x7A) {
                return '↳ Normal ASCII lowercase letter.';
            }
            if (code > 0x7F) {
                return '↳ Extended Unicode character (outside basic ASCII).';
            }
            return '';
        }
        
        document.getElementById('refreshBtn').addEventListener('click', fetchData);
        fetchData();
    </script>
</body>
</html>
